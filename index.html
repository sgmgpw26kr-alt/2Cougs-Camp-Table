const GROUPS=["Beef", "Chicken", "Lamb", "Sides", "Bread", "Dessert", "Pork", "Seafood"];
let currentFilter="All", currentId="", serving=localStorage.getItem("serving")||"4";
function stars(n){return"★★★★★".slice(0,n)+"☆☆☆☆☆".slice(0,5-n)}
function list(a){return"<ul>"+a.map(x=>"<li>"+x+"</li>").join("")+"</ul>"}
function checklist(a,id){return'<div class="checklist">'+a.map((x,i)=>'<label><input type="checkbox" data-key="'+id+'-'+i+'"> '+x+"</label>").join("")+"</div>"}
function ingredientsTable(c){return'<table class="ingtable"><thead><tr><th>Ingredient</th><th>Amount for '+serving+'</th></tr></thead><tbody>'+c.ingredients.map(x=>"<tr><td>"+x.name+"</td><td>"+x[serving]+"</td></tr>").join("")+"</tbody></table>"}
function campTimeline(a){return'<div class="legend"><span>🔥 Chimney</span><span>8⬇/16⬆ Coal pattern</span><span>🔄 Rotate</span><span>♻️ Refresh</span><span>🍳 Skillet heat</span><span>🧯 Done</span></div><table class="camptable"><thead><tr><th>Time</th><th>Cook Action</th><th>Fuel / Heat</th></tr></thead><tbody>'+a.map(x=>"<tr><td><b>"+x[0]+"</b></td><td>"+x[1]+"</td><td>"+x[2]+"</td></tr>").join("")+"</tbody></table>"}
function servingButtons(){return'<div class="servings"><button class="servebtn '+(serving=="4"?"active":"")+'" onclick="setServing(4)">4</button><button class="servebtn '+(serving=="6"?"active":"")+'" onclick="setServing(6)">6</button><button class="servebtn '+(serving=="8"?"active":"")+'" onclick="setServing(8)">8</button></div>'}
function setServing(n){let states={};document.querySelectorAll("details[data-section]").forEach(d=>states[d.dataset.section]=d.open);serving=String(n);localStorage.setItem("serving",serving);if(currentId){showCook(currentId);document.querySelectorAll("details[data-section]").forEach(d=>{if(states[d.dataset.section]!==undefined)d.open=states[d.dataset.section]})}}
function renderList(){let q=document.getElementById("search").value.toLowerCase(),root=document.getElementById("cooklist");root.innerHTML="";GROUPS.forEach(g=>{let items=COOKS.filter(c=>c.group==g).filter(c=>currentFilter=="All"||c.camp==currentFilter).filter(c=>(c.title+c.code+c.story+c.ingredients.map(i=>i.name).join(" ")+c.method+c.trivet).toLowerCase().includes(q));if(!items.length)return;let box=document.createElement("section");box.className="category card";box.innerHTML='<div class="cathead"><span>'+g+"</span><span>"+items.length+"</span></div>";items.forEach(c=>{let b=document.createElement("button");b.className="navbtn "+(c.code==currentId?"active":"");b.onclick=()=>showCook(c.code);b.innerHTML='<span class="navtitle">'+c.code+" — "+c.title+'</span><span class="navmeta">'+c.method+" • "+c.gear+'</span><span class="badges"><span class="badge">'+stars(c.difficulty)+'</span><span class="badge">Rating: '+c.rating+'</span><span class="badge '+c.camp+'">'+c.camp+"</span></span>";box.appendChild(b)});root.appendChild(box)})}
function showCook(code){let c=COOKS.find(x=>x.code==code)||COOKS[0];currentId=c.code;localStorage.setItem("lastCook",c.code);document.getElementById("detail").innerHTML=`<section class="hero" style="background-image:url('${c.hero}')"><div><div class="kicker">${c.code} • ${c.group}</div><h2>${c.title}</h2><p>${c.story}</p></div></section><section class="section card"><h3>Quick Look</h3><div class="grid"><div class="tile"><b>Difficulty</b><br>${stars(c.difficulty)}</div><div class="tile"><b>Camp</b><br><span class="badge ${c.camp}">${c.camp}</span></div><div class="tile"><b>Method</b><br>${c.method}</div><div class="tile"><b>Gear</b><br>${c.gear}</div><div class="tile"><b>Trivet</b><br>${c.trivet}</div><div class="tile"><b>Rating</b><br>${c.rating}</div></div></section><section class="section card"><details data-section="ingredients" open><summary>Ingredients</summary><div class="stickyserve">${servingButtons()}</div>${ingredientsTable(c)}</details></section><section class="section card"><details data-section="prep"><summary>Prep</summary>${checklist(c.prep,c.code)}</details></section><section class="section card"><details data-section="gasprep"><summary>Gas Prep</summary>${list(c.gasprep)}</details></section><section class="section card"><details data-section="timeline" open><summary>Fire Finish / Cook Timeline</summary>${campTimeline(c.timeline)}</details></section>${c.alternate?'<section class="section card"><h3>Alternate Method</h3><p>'+c.alternate+'</p></section>':''}<section class="section card"><h3>Complete the Meal</h3>${list(c.complete)}</section><section class="section card"><h3>Field Notes</h3><textarea class="notearea" data-note="${c.code}" placeholder="Date, campground, weather, wind, changes, rating..."></textarea></section>`;restore();renderList();if(innerWidth<900){document.getElementById("sidebar").classList.add("hide");scrollTo(0,0)}}
function showPage(p){currentId="";let content="";if(p=="home")content='<section class="section card"><h3>Welcome</h3><p>2Cougs Camp Table is built around your actual camp kitchen and a standard flow: <b>Prep → Gas Prep → Fire Finish → Complete the Meal</b>.</p></section>';if(p=="kitchen")content='<section class="section card"><h3>Our Camp Kitchen</h3><div class="grid"><div class="tile"><b>12-inch Camp Dutch Oven</b><br>Primary vessel.</div><div class="tile"><b>12-inch Skillet</b><br>Primary skillet.</div><div class="tile"><b>14-inch Skillet</b><br>Large groups and desserts.</div><div class="tile"><b>Solo Stove Pizza Oven</b><br>Preferred for all breads.</div><div class="tile"><b>Dual-burner Jetboil</b><br>Gas prep platform.</div><div class="tile"><b>Coghlan Camp Grill</b><br>Skillet platform.</div><div class="tile"><b>Low Cast-Iron Trivet</b><br>Braising/lifting.</div><div class="tile"><b>High Cast-Iron Trivet</b><br>Bread, cakes, steaming.</div></div></section>';if(p=="fire")content='<section class="section card"><h3>Fire Standard</h3><p>🔥 light chimney · 🔄 rotate · ♻️ refresh coals · ⬇ below · ⬆ on lid · 🧯 done.</p><p><b>Refresh coals</b> means replace spent briquettes with fresh fully lit briquettes.</p></section>';if(p=="foundations")content='<section class="section card"><h3>Foundations</h3><ul><li>Braises use Gas Prep first, then Fire Finish.</li><li>Breads default to Solo Stove Pizza Oven, with Dutch oven alternate.</li><li>Potatoes stay separate from long braises unless marked as one-pot variation.</li></ul></section>';if(p=="pantry")content='<section class="section card"><h3>Camp Pantry</h3><div class="grid"><div class="tile"><b>Refrigerated</b><br>Butter, cream, half & half, milk, eggs, Parmesan, mozzarella, sharp white cheddar, Gruyère, provolone, Asiago, feta, thick-cut bacon, pizza dough.</div><div class="tile"><b>Fresh Produce</b><br>Yellow onions, shallots, garlic, carrots, celery, Yukon Gold potatoes, baby potatoes, mushrooms, green beans, Brussels sprouts, lemons, oranges.</div><div class="tile"><b>Fresh Herbs</b><br>Parsley, rosemary, thyme, chives, green onions.</div><div class="tile"><b>Dry Pantry</b><br>Flour, baking powder, baking soda, cornstarch, kosher salt, pepper, garlic powder, onion powder, Italian seasoning, smoked paprika, red pepper flakes, sugar, brown sugar.</div><div class="tile"><b>Oils & Vinegars</b><br>Extra virgin olive oil, avocado oil, red wine vinegar.</div><div class="tile"><b>Canned / Bottled</b><br>Beef stock, chicken stock, tomato paste, Guinness, dry red wine, dry white wine, Dijon, Worcestershire, kalamata olives, Niçoise olives.</div><div class="tile"><b>Frozen Optional</b><br>Peas, peaches, ice cream.</div><div class="tile"><b>Spice Kit</b><br>Kosher salt, pepper, garlic powder, onion powder, Italian seasoning, smoked paprika, cayenne, cinnamon, nutmeg.</div></div></section>';document.getElementById("detail").innerHTML=content;renderList();if(innerWidth<900)document.getElementById("sidebar").classList.add("hide")}
function restore(){document.querySelectorAll("[data-key]").forEach(cb=>{cb.checked=localStorage.getItem(cb.dataset.key)=="1";cb.onchange=()=>localStorage.setItem(cb.dataset.key,cb.checked?"1":"0")});document.querySelectorAll("[data-note]").forEach(t=>{let k="note-"+t.dataset.note;t.value=localStorage.getItem(k)||"";t.oninput=()=>localStorage.setItem(k,t.value)})}
function showList(){document.getElementById("sidebar").classList.remove("hide");scrollTo(0,0)}
document.getElementById("search").oninput=renderList;document.querySelectorAll(".pill").forEach(p=>p.onclick=()=>{document.querySelectorAll(".pill").forEach(x=>x.classList.remove("active"));p.classList.add("active");currentFilter=p.dataset.filter;renderList()});renderList();showPage("home");if(localStorage.getItem("lastCook"))showCook(localStorage.getItem("lastCook"));if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script></body></html>
